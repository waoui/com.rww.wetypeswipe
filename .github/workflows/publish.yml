name: 发布模块版本

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-38-1.11.0
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      SOURCE_REPO: waoui/WeType-Swipe
      SOURCE_TAG: v1.11.0
      VERSION_CODE: "38"
      VERSION_NAME: "1.11.0"
      APK_NAME: WeType_Swipe_LSPosed_v1.11.0.apk
      SUMS_NAME: WeType_Swipe_v1.11.0_SHA256SUMS.txt
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: 检出模块仓库
        uses: actions/checkout@v4

      - name: 下载并校验正式 APK
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          BASE_URL="https://github.com/${SOURCE_REPO}/releases/download/${SOURCE_TAG}"
          curl --fail --location --retry 3 \
            "${BASE_URL}/${APK_NAME}" \
            --output "release/${APK_NAME}"
          curl --fail --location --retry 3 \
            "${BASE_URL}/${SUMS_NAME}" \
            --output "release/${SUMS_NAME}"

          cd release
          EXPECTED="$(awk -v file="${APK_NAME}" '$2 == file { print $1 }' "${SUMS_NAME}")"
          test -n "${EXPECTED}"
          printf '%s  %s\n' "${EXPECTED}" "${APK_NAME}" | sha256sum --check -

      - name: 生成更新说明
        shell: bash
        run: |
          cat > release-notes.md <<'EOF'
          ### 新增功能

          - 在 26 键和九宫格键帽底部显示已绑定的下滑功能。
          - 新增“显示按键底部功能文字”开关。
          - 新增“显示下滑触发提示”开关，可独立控制下滑预览和执行成功提示。
          - “选至段首”和“选至段尾”的键帽短标签调整为“选前”和“选后”。

          ### 显示与布局

          - 接入微信输入法原生单键绘制链，使用实时键帽坐标定位。
          - 自动适配普通键盘、分离键盘、悬浮键盘、横竖屏和键盘缩放。
          - 26 键与九宫格均使用原生键帽坐标。
          - 深色与浅色模式自动使用高对比文字。
          - 根据键帽高度自适应字号与基线。

          ### 性能优化

          - 移除周期性布局检查、触摸扫描和行列拟合的正常路径。
          - 缓存按键模型与显示文字，避免重复解析和查询配置。
          - 未绑定按键快速返回；关闭功能文字后提前退出。
          - 仅对已绑定且开启显示的按键增加一次文字绘制。
          EOF

      - name: 创建或更新模块 Release
        shell: bash
        run: |
          set -euo pipefail
          TAG="${VERSION_CODE}-${VERSION_NAME}"
          APK="release/${APK_NAME}"

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${APK}" --clobber
            gh release edit "${TAG}" \
              --title "${VERSION_NAME}" \
              --notes-file release-notes.md \
              --latest
          else
            gh release create "${TAG}" "${APK}" \
              --title "${VERSION_NAME}" \
              --notes-file release-notes.md \
              --latest
          fi
