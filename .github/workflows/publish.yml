name: 同步正式版到 LSPosed 官方仓库

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish.yml"
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: read

concurrency:
  group: sync-lsposed-official-release
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      SOURCE_REPO: waoui/WeType-Swipe
      TARGET_REPO: Xposed-Modules-Repo/com.rww.wetypeswipe
      GH_TOKEN: ${{ secrets.OFFICIAL_REPO_TOKEN }}

    steps:
      - name: 检查发布凭证
        shell: bash
        run: |
          set -euo pipefail
          test -n "${GH_TOKEN}"

      - name: 读取源码仓库最新正式版
        shell: bash
        run: |
          set -euo pipefail

          SOURCE_TAG="$(gh api "repos/${SOURCE_REPO}/releases/latest" --jq '.tag_name')"
          VERSION_NAME="${SOURCE_TAG#v}"

          GRADLE_FILE="$(curl --fail --location --retry 3 \
            "https://raw.githubusercontent.com/${SOURCE_REPO}/${SOURCE_TAG}/app/build.gradle.kts")"
          VERSION_CODE="$(printf '%s\n' "${GRADLE_FILE}" |
            sed -n 's/^[[:space:]]*versionCode[[:space:]]*=[[:space:]]*\([0-9][0-9]*\).*/\1/p' |
            head -n 1)"
          DECLARED_NAME="$(printf '%s\n' "${GRADLE_FILE}" |
            sed -n 's/^[[:space:]]*versionName[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' |
            head -n 1)"

          test -n "${SOURCE_TAG}"
          test -n "${VERSION_CODE}"
          test "${VERSION_NAME}" = "${DECLARED_NAME}"

          TAG="${VERSION_CODE}-${VERSION_NAME}"
          APK_NAME="WeType_Swipe_LSPosed_v${VERSION_NAME}.apk"
          SUMS_NAME="$(gh api "repos/${SOURCE_REPO}/releases/tags/${SOURCE_TAG}" \
            --jq '.assets[].name | select(endswith("_SHA256SUMS.txt"))' |
            head -n 1)"

          test -n "${SUMS_NAME}"

          {
            echo "SOURCE_TAG=${SOURCE_TAG}"
            echo "VERSION_CODE=${VERSION_CODE}"
            echo "VERSION_NAME=${VERSION_NAME}"
            echo "TAG=${TAG}"
            echo "APK_NAME=${APK_NAME}"
            echo "SUMS_NAME=${SUMS_NAME}"
          } >> "${GITHUB_ENV}"

      - name: 检查官方版本是否已经存在
        id: existing
        shell: bash
        run: |
          if gh release view "${TAG}" --repo "${TARGET_REPO}" >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            echo "官方 Release ${TAG} 已存在，无需重复发布。"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: 下载并校验正式 APK
        if: steps.existing.outputs.exists != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release

          gh release download "${SOURCE_TAG}" \
            --repo "${SOURCE_REPO}" \
            --dir release \
            --pattern "${APK_NAME}"

          gh release download "${SOURCE_TAG}" \
            --repo "${SOURCE_REPO}" \
            --dir release \
            --pattern "${SUMS_NAME}"

          cd release
          EXPECTED="$(awk -v file="${APK_NAME}" '$2 == file { print $1 }' "${SUMS_NAME}")"
          test -n "${EXPECTED}"
          printf '%s  %s\n' "${EXPECTED}" "${APK_NAME}" | sha256sum --check -

      - name: 复制源码 Release 更新说明
        if: steps.existing.outputs.exists != 'true'
        shell: bash
        run: |
          set -euo pipefail
          gh release view "${SOURCE_TAG}" \
            --repo "${SOURCE_REPO}" \
            --json body \
            --jq '.body' > release-notes.md
          test -s release-notes.md

      - name: 发布到 LSPosed 官方仓库
        if: steps.existing.outputs.exists != 'true'
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${TAG}" "release/${APK_NAME}" \
            --repo "${TARGET_REPO}" \
            --target main \
            --title "${VERSION_NAME}" \
            --notes-file release-notes.md \
            --latest
